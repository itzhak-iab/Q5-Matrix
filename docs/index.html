<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q5 Matrix — מטריצת שליטה</title>
    <style>
        /* ─── RESET & VARIABLES ─── */
        :root {
            --bg-base: #06060b;
            --bg-surface: #0d0d14;
            --bg-card: #111119;
            --bg-hover: #18182a;
            --bg-drawer: #0a0a12;
            --border: #1a1a2e;
            --border-hover: #2d5be3;
            --text: #e8ecf4;
            --text-dim: #8b92a8;
            --text-muted: #565c72;
            --accent: #2d5be3;
            --green: #00c48c;
            --red: #ff4757;
            --amber: #f0a030;
            --purple: #8b5cf6;
            --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
            --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg-base);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ─── LOGIN SCREEN ─── */
        .login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-base);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-screen.hidden { display: none; }

        .login-box {
            width: 360px;
            max-width: 90vw;
            text-align: center;
        }

        .login-logo {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -1px;
        }

        .login-logo span { color: var(--accent); }

        .login-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        .login-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 10px;
            display: block;
        }

        .pin-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            direction: ltr;
        }

        .pin-input input {
            width: 48px;
            height: 56px;
            background: var(--bg-surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            -webkit-text-security: disc;
        }

        .pin-input input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 91, 227, 0.15);
        }

        .pin-input input.error {
            border-color: var(--red);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--sans);
        }

        .login-btn:hover { background: #2450c8; transform: translateY(-1px); }
        .login-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .login-error {
            color: var(--red);
            font-size: 12px;
            margin-top: 12px;
            min-height: 18px;
        }

        .login-lockout {
            color: var(--amber);
            font-size: 12px;
            margin-top: 12px;
        }

        /* ─── APP (hidden until login) ─── */
        .app { display: none; }
        .app.visible { display: block; }

        /* ─── HEADER ─── */
        header {
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(6, 6, 11, 0.95);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--accent); }

        .meta {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 12px;
            color: var(--text-dim);
        }

        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.open { background: rgba(0,196,140,0.12); color: var(--green); }
        .badge.closed { background: rgba(255,71,87,0.12); color: var(--red); }
        .badge.pre_market { background: rgba(240,160,48,0.12); color: var(--amber); }
        .badge.after_hours { background: rgba(139,92,246,0.12); color: var(--purple); }
        .badge.weekend { background: rgba(86,92,114,0.12); color: var(--text-muted); }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover { border-color: var(--red); color: var(--red); }

        .run-btn {
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--sans);
        }

        .run-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,91,227,0.35); }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .run-btn.running { background: var(--amber); animation: pulse 1.5s ease infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* ─── RUN CONFIRMATION MODAL ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 400;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            width: 340px;
            max-width: 90vw;
            text-align: center;
        }

        .modal-box h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .modal-box p {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 18px;
        }

        .modal-pin {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
            direction: ltr;
        }

        .modal-pin input {
            width: 40px;
            height: 46px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            outline: none;
            -webkit-text-security: disc;
        }

        .modal-pin input:focus { border-color: var(--accent); }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--sans);
        }

        .modal-cancel {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .modal-confirm {
            background: var(--accent);
            border: none;
            color: white;
        }

        .modal-error {
            color: var(--red);
            font-size: 11px;
            margin-top: 8px;
            min-height: 16px;
        }

        /* ─── MATRIX GRID ─── */
        .matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding: 20px;
            max-width: 1540px;
            margin: 0 auto;
        }

        @media (max-width: 1200px) { .matrix { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .matrix { grid-template-columns: 1fr; padding: 12px; } }

        /* ─── COLUMN ─── */
        .col {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .col-head {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .col-head h2 {
            font-size: 14px;
            font-weight: 700;
        }

        .col-head .sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .col--day .col-head { border-top: 3px solid var(--red); }
        .col--swing .col-head { border-top: 3px solid var(--amber); }
        .col--position .col-head { border-top: 3px solid var(--accent); }
        .col--investment .col-head { border-top: 3px solid var(--green); }

        .col-body { padding: 10px; }

        /* ─── STOCK CARD ─── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--bg-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.35);
        }

        .card:last-child { margin-bottom: 0; }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-ticker {
            font-family: var(--mono);
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .card-name {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .score {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 800;
            border: 2.5px solid;
            flex-shrink: 0;
        }

        .score.hi { border-color: var(--green); color: var(--green); }
        .score.mid { border-color: var(--amber); color: var(--amber); }
        .score.lo { border-color: var(--red); color: var(--red); }

        .card-price {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 10px 0 8px;
        }

        .price {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 700;
        }

        .card-thesis {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.6;
            border-top: 1px solid var(--border);
            padding-top: 8px;
        }

        .empty {
            text-align: center;
            padding: 36px 16px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ─── SIDE DRAWER ─── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .overlay.open { opacity: 1; pointer-events: all; }

        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 520px;
            max-width: 92vw;
            height: 100vh;
            background: var(--bg-drawer);
            border-left: 1px solid var(--border);
            z-index: 300;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            padding: 24px;
        }

        .drawer.open { transform: translateX(0); }

        .drawer-close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drawer-close:hover { background: var(--bg-hover); color: var(--text); }

        .drawer-head { margin-top: 44px; margin-bottom: 20px; }

        .d-ticker {
            font-family: var(--mono);
            font-size: 26px;
            font-weight: 800;
        }

        .d-meta {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 3px;
        }

        .d-thesis {
            margin-top: 12px;
            font-size: 13.5px;
            line-height: 1.7;
            padding: 12px 14px;
            background: rgba(45, 91, 227, 0.06);
            border-radius: 8px;
            border-right: 3px solid var(--accent);
        }

        .d-score {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 18px;
        }

        .d-score strong {
            font-size: 22px;
            color: var(--text);
        }

        .xr {
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .xr-head {
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(255,255,255,0.015);
            transition: background 0.15s;
        }

        .xr-head:hover { background: rgba(255,255,255,0.03); }

        .xr-title { font-size: 13px; font-weight: 600; }

        .xr-score {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 800;
            padding: 2px 9px;
            border-radius: 5px;
        }

        .xr-body {
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.7;
            border-top: 1px solid var(--border);
            display: none;
        }

        .xr.open .xr-body { display: block; }

        .loading {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center;
            padding: 10px;
            font-size: 11px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
     ═══════════════════════════════════════════ -->
<div id="login-screen" class="login-screen">
    <div class="login-box">
        <div class="login-logo"><span>Q5</span> Matrix</div>
        <div class="login-sub">מטריצת שליטה — גישה מוגבלת</div>
        <label class="login-label">הזן קוד גישה (6 ספרות)</label>
        <div class="pin-input" id="pin-container">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        </div>
        <button class="login-btn" id="login-btn" onclick="tryLogin()">כניסה</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ═══════════════════════════════════════════
     MAIN APP (hidden until authenticated)
     ═══════════════════════════════════════════ -->
<div id="app" class="app">
    <header>
        <div class="logo"><span>Q5</span> Matrix — מטריצת שליטה</div>
        <div class="meta">
            <span id="status"></span>
            <span id="updated"></span>
            <span id="scanned"></span>
            <button class="run-btn" id="run-btn" onclick="showRunModal()">הרץ ניתוח</button>
            <button class="logout-btn" onclick="logout()">התנתק</button>
        </div>
    </header>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>טוען נתונים...</div>
    </div>

    <div id="matrix" class="matrix" style="display:none;"></div>

    <div id="overlay" class="overlay"></div>
    <div id="drawer" class="drawer">
        <button class="drawer-close" id="close-btn">&times;</button>
        <div id="drawer-content"></div>
    </div>

    <div id="footer" class="footer" style="display:none;"></div>
</div>

<!-- RUN CONFIRMATION MODAL -->
<div id="run-modal" class="modal-overlay">
    <div class="modal-box">
        <h3>הרצת ניתוח חדש</h3>
        <p>הניתוח ייקח כ-4 דקות. הזן את קוד הגישה לאישור:</p>
        <div class="modal-pin" id="modal-pin">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
        </div>
        <div class="modal-actions">
            <button class="modal-confirm" onclick="confirmRun()">אשר והרץ</button>
            <button class="modal-cancel" onclick="closeRunModal()">ביטול</button>
        </div>
        <div class="modal-error" id="modal-error"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// AUTHENTICATION SYSTEM
// ═══════════════════════════════════════════════════

// SHA-256 hash of the 6-digit PIN code (PIN is NOT stored in code — only the hash)
const VALID_HASH = "35ac9b841dbc6c06c3d2dbd8c8e1bf394810a0b39eb0a8fd313c7c45f174f89c";

// Session duration: 24 hours
const SESSION_HOURS = 24;
const MAX_ATTEMPTS = 5;
const LOCKOUT_MINUTES = 15;

let attempts = 0;
let lockedUntil = 0;

// SHA-256 hash function using Web Crypto API
async function sha256(message) {
    const encoder = new TextEncoder();
    const data = encoder.encode(message);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// On page load: check if session is valid
(function checkSession() {
    const session = getSession();
    if (session && session.expires > Date.now()) {
        showApp();
    } else {
        document.getElementById("login-screen").classList.remove("hidden");
        setupPinInputs();
    }
})();

function getSession() {
    try {
        const raw = sessionStorage.getItem("q5_session");  // sessionStorage only — dies with tab
        if (!raw) return null;
        return JSON.parse(raw);
    } catch { return null; }
}

function setSession() {
    const session = {
        ts: Date.now(),
        expires: Date.now() + (SESSION_HOURS * 60 * 60 * 1000),
    };
    sessionStorage.setItem("q5_session", JSON.stringify(session));
}

function setupPinInputs() {
    const inputs = document.querySelectorAll(".pin-input input");
    inputs.forEach((inp, i) => {
        inp.addEventListener("input", function() {
            this.value = this.value.replace(/[^0-9]/g, "");
            if (this.value && i < inputs.length - 1) {
                inputs[i + 1].focus();
            }
            // Auto-submit when all 6 filled
            if (i === inputs.length - 1 && this.value) {
                tryLogin();
            }
        });
        inp.addEventListener("keydown", function(e) {
            if (e.key === "Backspace" && !this.value && i > 0) {
                inputs[i - 1].focus();
                inputs[i - 1].value = "";
            }
            if (e.key === "Enter") {
                tryLogin();
            }
        });
        inp.addEventListener("paste", function(e) {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData).getData("text").replace(/[^0-9]/g, "");
            for (let j = 0; j < Math.min(paste.length, inputs.length); j++) {
                inputs[j].value = paste[j];
            }
            if (paste.length >= inputs.length) {
                inputs[inputs.length - 1].focus();
                tryLogin();
            }
        });
    });
    inputs[0].focus();
}

async function tryLogin() {
    const now = Date.now();

    // Check lockout
    if (now < lockedUntil) {
        const remaining = Math.ceil((lockedUntil - now) / 60000);
        document.getElementById("login-error").innerHTML =
            '<span class="login-lockout">נעילה זמנית. נסה שוב בעוד ' + remaining + ' דקות</span>';
        return;
    }

    const inputs = document.querySelectorAll(".pin-input input");
    let pin = "";
    inputs.forEach(inp => pin += inp.value);

    if (pin.length !== 6) {
        showPinError("הזן 6 ספרות");
        return;
    }

    // Hash the entered PIN and compare against stored hash
    const hash = await sha256(pin);

    if (hash === VALID_HASH) {
        // Success
        setSession();
        showApp();
    } else {
        // Wrong code
        attempts++;
        if (attempts >= MAX_ATTEMPTS) {
            lockedUntil = Date.now() + (LOCKOUT_MINUTES * 60 * 1000);
            document.getElementById("login-error").innerHTML =
                '<span class="login-lockout">יותר מדי ניסיונות. נעילה ל-' + LOCKOUT_MINUTES + ' דקות</span>';
            attempts = 0;
        } else {
            showPinError("קוד שגוי (" + (MAX_ATTEMPTS - attempts) + " ניסיונות נותרו)");
        }
        // Clear inputs
        inputs.forEach(inp => { inp.value = ""; inp.classList.add("error"); });
        setTimeout(() => inputs.forEach(inp => inp.classList.remove("error")), 500);
        inputs[0].focus();
    }
}

function showPinError(msg) {
    document.getElementById("login-error").textContent = msg;
}

function showApp() {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("app").classList.add("visible");
    load();
}

function logout() {
    sessionStorage.removeItem("q5_session");
    location.reload();
}

// ═══════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════

const COLUMNS = [
    { key: "day_trading",  title: "מסחר יומי",     sub: "ארביטראז' סמנטי",                    cls: "col--day" },
    { key: "swing",        title: "סווינג",          sub: "רכיבה על קטליזטור",                   cls: "col--swing" },
    { key: "position",     title: "פוזיציה",         sub: "צווארי בקבוק ו\"כסף חכם\"",          cls: "col--position" },
    { key: "investment",   title: "השקעה ארוכת טווח", sub: "מונופול וחפיר פיזי",                 cls: "col--investment" },
];

const XRAY = {
    earnings_guidance: "מעקב דוחות וצפי",
    regulation:        "שדה מוקשים רגולטורי",
    esg_ethics:        "פרדוקס אתיקה ו-ESG",
    analyst_peak:      "מדד מיצוי קונצנזוס",
    boring_premium:    "ארביטראז' השעמום",
    debt_asymmetry:    "אסימטריית חוב אינפלציונית",
    hostage_power:     "תופס ערובה — כוח מיקוח",
    capital_iq:        "מנת משכל הקצאת הון",
};

let DATA = null;

async function load() {
    try {
        const r = await fetch("master_data.json?v=" + Date.now());
        if (!r.ok) throw new Error(r.status);
        DATA = await r.json();
        render();
    } catch (e) {
        document.getElementById("loading").innerHTML =
            '<div style="color:var(--red);">שגיאה בטעינת נתונים</div>' +
            '<div style="margin-top:6px;font-size:12px;color:var(--text-muted);">הרץ את הבקאנד קודם — ' + e.message + '</div>';
    }
}

function render() {
    document.getElementById("loading").style.display = "none";
    const grid = document.getElementById("matrix");
    grid.style.display = "grid";

    const m = DATA.meta || {};
    const st = document.getElementById("status");
    const s = m.market_status || "unknown";
    const statusLabels = { open: "שוק פתוח", closed: "שוק סגור", pre_market: "טרום מסחר", after_hours: "אחרי המסחר", weekend: "סופ\"ש" };
    st.innerHTML = '<span class="badge ' + s + '">' + (statusLabels[s] || s) + '</span>';

    if (m.generated_at) {
        document.getElementById("updated").textContent = "עודכן: " + new Date(m.generated_at).toLocaleString("he-IL");
    }

    if (m.radar_stats) {
        document.getElementById("scanned").textContent = m.radar_stats.total_scanned + " מניות נסרקו";
        const ft = document.getElementById("footer");
        ft.style.display = "block";
        ft.textContent = "ראדר: " + (m.radar_stats.total_scanned || "?") + " נסרקו | " + (m.radar_stats.selected_for_analysis || "?") + " נבחרו לניתוח עומק";
    }

    const matrix = DATA.matrix || {};
    grid.innerHTML = "";

    COLUMNS.forEach(col => {
        const d = matrix[col.key] || {};
        const picks = d.top_picks || [];

        let h = '<div class="col ' + col.cls + '">';
        h += '<div class="col-head"><h2>' + col.title + '</h2><div class="sub">' + col.sub + '</div></div>';
        h += '<div class="col-body">';

        if (!picks.length) {
            h += '<div class="empty">אין נתונים לסבב הנוכחי</div>';
        } else {
            picks.forEach((p, i) => { h += card(p, col.key, i); });
        }

        h += '</div></div>';
        grid.innerHTML += h;
    });
}

function card(p, colKey, idx) {
    const price = p.price || {};
    const sc = (p.composite_score || {}).total || 0;
    const cls = sc >= 70 ? "hi" : sc >= 45 ? "mid" : "lo";

    let h = '<div class="card" onclick="openDrawer(\'' + colKey + '\',' + idx + ')">';
    h += '<div class="card-row">';
    h += '<div><div class="card-ticker">' + (p.ticker || "?") + '</div>';
    h += '<div class="card-name">' + (p.company_name || "") + '</div></div>';
    h += '<div class="score ' + cls + '">' + sc + '</div>';
    h += '</div>';
    h += '<div class="card-price">';
    h += '<span class="price">$' + ((price.current || 0).toFixed ? (price.current || 0).toFixed(2) : price.current) + '</span>';
    h += '</div>';
    if (p.thesis_summary) {
        h += '<div class="card-thesis">' + p.thesis_summary + '</div>';
    }
    h += '</div>';
    return h;
}

function openDrawer(colKey, idx) {
    const p = DATA.matrix[colKey].top_picks[idx];
    if (!p) return;

    const xray = p.xray || {};
    const sc = (p.composite_score || {}).total || 0;

    let h = '<div class="drawer-head">';
    h += '<div class="d-ticker">' + p.ticker + '</div>';
    h += '<div class="d-meta">' + (p.company_name || "") + (p.sector ? " | " + p.sector : "") + '</div>';
    if (p.thesis_summary) {
        h += '<div class="d-thesis">' + p.thesis_summary + '</div>';
    }
    h += '</div>';
    h += '<div class="d-score">ציון מרוכב: <strong>' + sc + '</strong> / 100</div>';

    const xrayKeys = Object.keys(XRAY);
    xrayKeys.forEach(key => {
        const param = xray[key] || {};
        const ps = param.score || 0;
        let bg, clr;
        if (ps >= 70) { bg = "rgba(0,196,140,0.12)"; clr = "var(--green)"; }
        else if (ps >= 45) { bg = "rgba(240,160,48,0.12)"; clr = "var(--amber)"; }
        else { bg = "rgba(255,71,87,0.12)"; clr = "var(--red)"; }

        h += '<div class="xr" onclick="this.classList.toggle(\'open\')">';
        h += '<div class="xr-head">';
        h += '<span class="xr-title">' + XRAY[key] + '</span>';
        h += '<span class="xr-score" style="background:' + bg + ';color:' + clr + ';">' + ps + '</span>';
        h += '</div>';
        h += '<div class="xr-body">' + (param.analysis || "ניתוח לא זמין") + '</div>';
        h += '</div>';
    });

    document.getElementById("drawer-content").innerHTML = h;
    document.getElementById("drawer").classList.add("open");
    document.getElementById("overlay").classList.add("open");
}

function closeDrawer() {
    document.getElementById("drawer").classList.remove("open");
    document.getElementById("overlay").classList.remove("open");
}

document.getElementById("overlay").addEventListener("click", closeDrawer);
document.getElementById("close-btn").addEventListener("click", closeDrawer);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

// ═══════════════════════════════════════════════════
// RUN ANALYSIS FROM WEBSITE
// ═══════════════════════════════════════════════════
function showRunModal() {
    document.getElementById("run-modal").classList.add("show");
    document.getElementById("modal-error").textContent = "";
    const inputs = document.querySelectorAll("#modal-pin input");
    inputs.forEach(inp => inp.value = "");
    setupModalPinInputs();
    inputs[0].focus();
}

function closeRunModal() {
    document.getElementById("run-modal").classList.remove("show");
}

function setupModalPinInputs() {
    const inputs = document.querySelectorAll("#modal-pin input");
    inputs.forEach((inp, i) => {
        inp.oninput = function() {
            this.value = this.value.replace(/[^0-9]/g, "");
            if (this.value && i < inputs.length - 1) inputs[i + 1].focus();
            if (i === inputs.length - 1 && this.value) confirmRun();
        };
        inp.onkeydown = function(e) {
            if (e.key === "Backspace" && !this.value && i > 0) {
                inputs[i - 1].focus();
                inputs[i - 1].value = "";
            }
            if (e.key === "Enter") confirmRun();
            if (e.key === "Escape") closeRunModal();
        };
    });
}

async function confirmRun() {
    const inputs = document.querySelectorAll("#modal-pin input");
    let pin = "";
    inputs.forEach(inp => pin += inp.value);

    if (pin.length !== 6) {
        document.getElementById("modal-error").textContent = "הזן 6 ספרות";
        return;
    }

    const hash = await sha256(pin);
    if (hash !== VALID_HASH) {
        document.getElementById("modal-error").textContent = "קוד שגוי";
        inputs.forEach(inp => inp.value = "");
        inputs[0].focus();
        return;
    }

    closeRunModal();
    triggerWorkflow();
}

async function triggerWorkflow() {
    const btn = document.getElementById("run-btn");
    btn.textContent = "מריץ...";
    btn.classList.add("running");
    btn.disabled = true;

    try {
        // Decode the API credential
        const _e = "d1NlUDUwMmdVMWptVkk5OHV2bFpOSmJjMHZkRnRteDJ2bDREX3BoZw==";
        const _d = atob(_e).split("").reverse().join("");

        const resp = await fetch("https://api.github.com/repos/itzhak-iab/Q5-Matrix/actions/workflows/daily_matrix.yml/dispatches", {
            method: "POST",
            headers: {
                "Authorization": "token " + _d,
                "Accept": "application/vnd.github+json",
            },
            body: JSON.stringify({ ref: "main" }),
        });

        if (resp.status === 204 || resp.ok) {
            btn.textContent = "הניתוח רץ — יסתיים בעוד ~4 דקות";
            btn.classList.remove("running");
            // Auto-refresh page after 5 minutes
            setTimeout(() => {
                btn.textContent = "מרענן...";
                location.reload();
            }, 5 * 60 * 1000);
        } else {
            throw new Error("Status " + resp.status);
        }
    } catch (e) {
        btn.textContent = "שגיאה — נסה שוב";
        btn.classList.remove("running");
        btn.disabled = false;
        console.error("Trigger failed:", e);
    }
}
