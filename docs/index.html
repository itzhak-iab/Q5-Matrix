<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#08090c">
    <title>CATALYST</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090c; --bg2: #0f1117; --bg3: #161821; --bg4: #1c1e2a;
            --border: #232538; --border-h: #00d4ff;
            --accent: #00d4ff; --accent-dim: #0099bb; --accent-glow: rgba(0,212,255,0.12);
            --txt: #e4e6ef; --txt2: #9498b3; --txt3: #565a75;
            --green: #2dd4a8; --red: #f0506e; --amber: #f5a623; --purple: #8b7cf6;
            --mono: 'SF Mono','JetBrains Mono','Fira Code',monospace;
            --r: 12px;
            --safe-b: env(safe-area-inset-bottom, 0px);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);overscroll-behavior:none}
        .login{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
        .login.hide{display:none}
        .login-box{width:340px;max-width:88vw;text-align:center}
        .login-logo{font-size:36px;font-weight:900;letter-spacing:4px;margin-bottom:2px;background:linear-gradient(135deg,var(--accent),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .login-sub{font-size:10px;color:var(--txt3);letter-spacing:5px;text-transform:uppercase;margin-bottom:36px}
        .pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:24px;direction:ltr}
        .pin-row input{width:44px;height:54px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;color:var(--txt);font-family:var(--mono);font-size:20px;font-weight:700;text-align:center;outline:none;transition:.2s;-webkit-text-security:disc}
        .pin-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
        .pin-row input.err{border-color:var(--red);animation:shake .4s}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
        .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px}
        .login-msg{color:var(--red);font-size:12px;margin-top:12px;min-height:18px}
        .login-msg.lock{color:var(--amber)}
        .login-label{font-size:12px;color:var(--txt2);margin-bottom:12px}
        .app{display:none;flex-direction:column;height:100dvh;height:100vh}
        .app.on{display:flex}
        .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;min-height:54px}
        .topbar-logo{font-size:18px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .badge{padding:3px 10px;border-radius:16px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
        .badge.open{background:rgba(45,212,168,.1);color:var(--green);border:1px solid rgba(45,212,168,.2)}
        .badge.closed{background:rgba(240,80,110,.1);color:var(--red);border:1px solid rgba(240,80,110,.2)}
        .badge.pre_market{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
        .badge.after_hours{background:rgba(139,124,246,.1);color:var(--purple);border:1px solid rgba(139,124,246,.2)}
        .badge.weekend{background:rgba(90,90,114,.1);color:var(--txt3);border:1px solid rgba(90,90,114,.2)}
        .btn-s{background:transparent;color:var(--accent);border:1px solid rgba(0,212,255,.4);padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
        .btn-s:hover{background:var(--accent);color:#000}
        .btn-s.running{background:var(--amber);border-color:var(--amber);color:#000;animation:pulse 1.5s ease infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .btn-ghost{background:none;border:1px solid var(--border);color:var(--txt3);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:10px;white-space:nowrap}
        .btn-ghost:hover{border-color:var(--red);color:var(--red)}
        .infobar{display:none;padding:6px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--txt3);flex-shrink:0;gap:10px;align-items:center;flex-wrap:wrap}
        .infobar.on{display:flex}
        .infobar select{background:var(--bg3);border:1px solid var(--border);color:var(--txt);padding:4px 8px;border-radius:6px;font-size:11px;font-family:var(--mono);cursor:pointer;outline:none}
        .arch-badge{color:var(--amber);font-weight:700;display:none;font-size:10px}
        .arch-badge.on{display:inline}
        .info-spacer{flex:1}
        .filter-bar{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .filter-bar::-webkit-scrollbar{display:none}
        .fbtn{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--txt3);white-space:nowrap;transition:.2s}
        .fbtn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
        .fbtn:hover{border-color:var(--accent-dim)}
        .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
        .content::-webkit-scrollbar{width:4px}
        .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .loading{text-align:center;color:var(--txt3);padding:60px 20px}
        .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .stock-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;max-width:720px;margin:0 auto;width:100%}
        .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
        .card:hover{border-color:rgba(0,212,255,.25);background:var(--bg3)}
        .card:active{transform:scale(.985)}
        .card::before{content:'';position:absolute;top:0;right:0;left:0;height:2px}
        .card.bullish::before{background:linear-gradient(90deg,var(--green),transparent)}
        .card.bearish::before{background:linear-gradient(90deg,var(--red),transparent)}
        .card.neutral::before{background:linear-gradient(90deg,var(--txt3),transparent)}
        .card-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
        .card-left{display:flex;align-items:center;gap:10px}
        .card-ticker{font-size:20px;font-weight:900;font-family:var(--mono);letter-spacing:1px}
        .card-price{font-family:var(--mono);font-size:12px;color:var(--txt2)}
        .card-change{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:var(--mono)}
        .card-change.up{background:rgba(45,212,168,.1);color:var(--green)}
        .card-change.down{background:rgba(240,80,110,.1);color:var(--red)}
        .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
        .card-conf{min-width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:16px;font-weight:900}
        .card-conf.hi{background:rgba(45,212,168,.1);color:var(--green);border:1px solid rgba(45,212,168,.2)}
        .card-conf.mid{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
        .card-conf.lo{background:rgba(240,80,110,.1);color:var(--red);border:1px solid rgba(240,80,110,.2)}
        .card-row2{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
        .card-signal{display:inline-block;padding:3px 10px;border-radius:5px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
        .card-signal.bullish{background:rgba(45,212,168,.08);border:1px solid rgba(45,212,168,.25);color:var(--green)}
        .card-signal.bearish{background:rgba(240,80,110,.08);border:1px solid rgba(240,80,110,.25);color:var(--red)}
        .card-signal.neutral{background:rgba(139,124,246,.08);border:1px solid rgba(139,124,246,.25);color:var(--purple)}
        .card-co{font-size:10.5px;color:var(--txt3)}
        .card-bottom{font-size:12px;line-height:1.6;color:var(--txt2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .card-badges{display:flex;gap:4px;align-items:center;margin-left:auto}
        .card-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700}
        .card-badge.short{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
        .card-badge.long{background:rgba(139,124,246,.1);color:var(--purple);border:1px solid rgba(139,124,246,.2)}
        .empty-state{text-align:center;padding:60px 20px;color:var(--txt3)}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;z-index:100;opacity:0;transition:opacity .3s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
        .overlay.on{display:block;opacity:1}
        .drawer{position:fixed;top:0;right:-100%;width:100%;max-width:580px;height:100dvh;height:100vh;background:var(--bg);border-left:1px solid rgba(0,212,255,.1);z-index:101;transition:right .3s cubic-bezier(.16,1,.3,1);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px calc(20px + var(--safe-b));box-shadow:-8px 0 32px rgba(0,0,0,.5)}
        .drawer.on{right:0}
        .drawer::-webkit-scrollbar{width:3px}
        .drawer::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .close-x{position:sticky;top:0;z-index:5;display:flex;justify-content:flex-start;padding-bottom:8px}
        .close-x button{background:var(--bg2);border:1px solid var(--border);color:var(--txt2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
        .d-head{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
        .d-ticker{font-size:28px;font-weight:900;font-family:var(--mono);letter-spacing:2px;background:linear-gradient(135deg,var(--accent),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .d-meta{font-size:12px;color:var(--txt2);margin-top:3px}
        .d-price{font-family:var(--mono);font-size:14px;margin-top:6px}
        .d-signal{display:inline-block;padding:5px 16px;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:.5px;margin:10px 0}
        .d-signal.bullish{background:rgba(45,212,168,.1);border:1.5px solid rgba(45,212,168,.3);color:var(--green)}
        .d-signal.bearish{background:rgba(240,80,110,.1);border:1.5px solid rgba(240,80,110,.3);color:var(--red)}
        .d-signal.neutral{background:rgba(139,124,246,.1);border:1.5px solid rgba(139,124,246,.3);color:var(--purple)}
        .d-conf{font-size:11px;color:var(--txt3);margin-bottom:14px}
        .d-conf strong{font-size:22px;font-weight:900;font-family:var(--mono)}
        .d-conf strong.hi{color:var(--green)}.d-conf strong.mid{color:var(--amber)}.d-conf strong.lo{color:var(--red)}
        .d-bl{font-size:14px;line-height:1.7;color:var(--txt);padding:12px 14px;background:rgba(0,212,255,.04);border-radius:var(--r);border-right:3px solid var(--accent);margin-bottom:16px;font-weight:500}
        .d-sec{margin-bottom:12px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
        .d-sec-t{font-size:11px;font-weight:700;margin-bottom:8px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
        .d-sec-b{font-size:12.5px;color:var(--txt2);line-height:1.75}
        .cat-item{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;position:relative;overflow:hidden}
        .cat-item::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 var(--r) var(--r) 0}
        .cat-item.pos::before{background:var(--green)}.cat-item.neg::before{background:var(--red)}.cat-item.unk::before{background:var(--amber)}
        .cat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .cat-title{font-size:12px;font-weight:700;color:var(--txt)}
        .cat-type{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
        .cat-type.earnings{background:rgba(0,212,255,.1);color:var(--accent)}
        .cat-type.regulatory{background:rgba(240,80,110,.1);color:var(--red)}
        .cat-type.macro{background:rgba(245,166,35,.1);color:var(--amber)}
        .cat-type.business{background:rgba(45,212,168,.1);color:var(--green)}
        .cat-type.sector{background:rgba(139,124,246,.1);color:var(--purple)}
        .cat-type.technical{background:rgba(0,212,255,.08);color:#5eead4;border:1px solid rgba(0,212,255,.2)}
        .cat-type.squeeze{background:rgba(240,80,110,.08);color:#fda4af;border:1px solid rgba(240,80,110,.2)}
        .cat-desc{font-size:11.5px;color:var(--txt2);line-height:1.6}
        .cat-tf{font-size:10px;color:var(--txt3);margin-top:4px}
        .qa{padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s}
        .qa:hover{background:var(--bg4)}
        .qa-q{font-size:12.5px;font-weight:700;color:var(--txt);margin-bottom:6px}
        .qa-a{font-size:12px;color:var(--txt2);line-height:1.65;display:none}
        .qa.open .qa-a{display:block}
        .qa-imp{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:6px}
        .qa-imp.pos{background:rgba(45,212,168,.1);color:var(--green)}
        .qa-imp.neg{background:rgba(240,80,110,.1);color:var(--red)}
        .qa-imp.neut{background:rgba(139,124,246,.1);color:var(--purple)}
        .buzz-alert{margin-bottom:12px;padding:14px;background:rgba(245,166,35,.08);border:1.5px solid rgba(245,166,35,.3);border-radius:var(--r);display:flex;gap:10px;align-items:flex-start}
        .buzz-alert-icon{font-size:18px;flex-shrink:0}
        .buzz-alert-content{flex:1}
        .buzz-alert-t{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
        .buzz-alert-b{font-size:12.5px;color:var(--txt);line-height:1.6}
        .d-sources{margin-bottom:12px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
        .d-sources-t{font-size:11px;font-weight:700;margin-bottom:8px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
        .d-sources-list{list-style:none;padding:0;margin:0}
        .d-sources-list li{font-size:11.5px;color:var(--txt2);line-height:1.7;padding:4px 0;border-bottom:1px solid rgba(35,37,56,.5)}
        .d-sources-list li:last-child{border-bottom:none}
        .d-sources-list a{color:var(--accent);text-decoration:none}
        .d-sources-list a:hover{text-decoration:underline}
        .ac-wrap{position:relative}
        .ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--accent-dim);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:10;display:none;scrollbar-width:thin}
        .ac-list.on{display:block}
        .ac-item{padding:8px 10px;font-size:11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);direction:ltr;text-align:left}
        .ac-item:last-child{border-bottom:none}
        .ac-item:hover,.ac-item.sel{background:var(--accent-glow)}
        .ac-sym{font-family:var(--mono);font-weight:700;color:var(--accent);font-size:12px}
        .ac-name{color:var(--txt2);font-size:10px;text-align:right;direction:rtl;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .ac-scanning{text-align:center;padding:20px;color:var(--accent);font-size:13px;font-weight:600}
        .ac-scanning .spinner{margin:0 auto 10px}
        .d-rescan{width:100%;padding:10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),#6366f1);border:none;color:#fff;letter-spacing:1px;margin-bottom:12px;transition:.2s}
        .d-rescan:hover{opacity:.85}
        .d-rescan:disabled{opacity:.5;cursor:not-allowed}
        .d-rescan.running{background:var(--amber);animation:pulse 1.5s ease infinite}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:20px}
        .modal.on{display:flex}
        .modal-box{background:var(--bg2);border:1px solid rgba(0,212,255,.2);border-radius:14px;padding:28px 24px;width:360px;max-width:100%;text-align:center;max-height:90vh;overflow-y:auto}
        .modal-box h3{font-size:15px;margin-bottom:5px;color:var(--accent)}
        .modal-box p{font-size:11px;color:var(--txt3);margin-bottom:14px}
        .m-section{margin-bottom:18px}
        .m-section-title{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
        .m-analysis-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
        .m-analysis-opt{padding:10px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--txt3);cursor:pointer;font-size:11px;font-weight:600;transition:.2s;text-align:right}
        .m-analysis-opt:hover{border-color:var(--accent-dim);color:var(--txt)}
        .m-analysis-opt.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
        .m-analysis-desc{font-size:9px;color:var(--txt3);margin-top:4px;line-height:1.5}
        .m-picks{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px}
        .m-pick{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--txt3);font-family:var(--mono);transition:.2s}
        .m-pick.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
        .m-pick.custom{background:rgba(139,124,246,.1);border-color:rgba(139,124,246,.3);color:var(--purple)}
        .m-pick.custom.active{background:var(--purple);border-color:var(--purple);color:#fff}
        .m-market-selector{display:flex;gap:8px;margin-bottom:14px}
        .m-market-btn{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--txt3);cursor:pointer;font-size:11px;font-weight:700;transition:.2s}
        .m-market-btn:hover{border-color:var(--accent-dim);color:var(--txt)}
        .m-market-btn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
        .m-input-group{margin-bottom:12px;text-align:right}
        .m-input-group label{display:block;font-size:10px;color:var(--txt3);margin-bottom:6px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
        .m-input-group input{width:100%;padding:10px;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;color:var(--txt);font-size:12px;outline:none;font-family:inherit;text-align:right}
        .m-input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
        .m-pin{display:flex;gap:6px;justify-content:center;margin-bottom:16px;direction:ltr}
        .m-pin input{width:40px;height:46px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-family:var(--mono);font-size:17px;font-weight:700;text-align:center;outline:none;-webkit-text-security:disc}
        .m-pin input:focus{border-color:var(--accent)}
        .m-acts{display:flex;gap:8px}
        .m-acts button{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
        .m-cancel{background:none;border:1px solid var(--border);color:var(--txt3)}
        .m-confirm{background:linear-gradient(135deg,var(--accent),#6366f1);border:none;color:#fff}
        .m-remove{background:none;border:1px solid var(--red);color:var(--red)}
        .m-err{color:var(--red);font-size:10px;margin-top:8px;min-height:14px}
        .footer{text-align:center;padding:6px;font-size:9px;color:var(--txt3);border-top:1px solid var(--border);flex-shrink:0;letter-spacing:1px;display:none;padding-bottom:calc(6px + var(--safe-b))}
        @media(min-width:900px){
            .topbar{padding:12px 28px}
            .topbar-logo{font-size:22px}
            .infobar{padding:6px 28px}
            .filter-bar{padding:10px 28px}
            .stock-list{padding:16px 28px}
            .drawer{width:580px;right:-580px;padding:28px}
        }
    </style>
</head>
<body>
<div id="login" class="login">
    <div class="login-box">
        <div class="login-logo">CATALYST</div>
        <div class="login-sub">Stock Intelligence</div>
        <div class="login-label">הזן קוד גישה</div>
        <div class="pin-row" id="pin-box">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off">
        </div>
        <button class="login-btn" onclick="tryLogin()">כניסה</button>
        <div class="login-msg" id="login-msg"></div>
    </div>
</div>
<div id="app" class="app">
    <div class="topbar">
        <div class="topbar-logo">CATALYST</div>
        <div class="topbar-right">
            <span id="status"></span>
            <button class="btn-s" id="add-btn" onclick="showAddTickerModal()" title="הוסף טיקר">+</button>
            <button class="btn-s" id="run-btn" onclick="showRunModal()">SCAN</button>
            <button class="btn-ghost" onclick="logout()">יציאה</button>
        </div>
    </div>
    <div class="infobar" id="infobar">
        <span id="ts-info"></span>
        <span id="scan-info"></span>
        <div class="info-spacer"></div>
        <label>ארכיון:</label>
        <select id="hist-sel" onchange="loadHistory(this.value)"><option value="">נוכחי</option></select>
        <span class="arch-badge" id="arch-badge">ARCHIVE</span>
    </div>
    <div class="filter-bar" id="filter-bar">
        <button class="fbtn active" data-filter="all" onclick="setFilter('all',this)">הכל</button>
        <button class="fbtn" data-filter="bullish" onclick="setFilter('bullish',this)">חיובי</button>
        <button class="fbtn" data-filter="bearish" onclick="setFilter('bearish',this)">שלילי</button>
        <button class="fbtn" data-filter="high" onclick="setFilter('high',this)">ביטחון גבוה</button>
        <button class="fbtn" data-filter="us" onclick="setFilter('us',this)" title="שוק אמריקאי">🇺🇸</button>
        <button class="fbtn" data-filter="il" onclick="setFilter('il',this)" title="שוק ישראלי">🇮🇱</button>
    </div>
    <div class="content" id="content">
        <div id="loading" class="loading"><div class="spinner"></div><div>טוען נתוני מודיעין...</div></div>
        <div class="stock-list" id="stock-list" style="display:none"></div>
    </div>
    <div class="footer" id="footer"></div>
    <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="close-x"><button onclick="closeDrawer()">&#x00D7;</button></div>
        <div id="drawer-c"></div>
    </div>
</div>
<div id="run-modal" class="modal">
    <div class="modal-box">
        <h3>סריקה כללית — כל הטיקרים</h3>
        <div class="m-section">
            <div class="m-section-title">סוג ניתוח</div>
            <div class="m-analysis-opts">
                <button class="m-analysis-opt active" data-type="short" onclick="selectAnalysisType('short',this)">
                    <div>⏱ טווח קצר</div>
                    <div class="m-analysis-desc">גיאופוליטי, רגולטורי, דוחות, תקלות, חילופי אנשים</div>
                </button>
                <button class="m-analysis-opt" data-type="long" onclick="selectAnalysisType('long',this)">
                    <div>📅 טווח ארוך</div>
                    <div class="m-analysis-desc">מבנה עסקי, תחרות, חדשנות, יציבות פיננסית</div>
                </button>
            </div>
        </div>
        <p style="font-size:10px;color:var(--txt3);margin-bottom:10px" id="m-time">הזן קוד לאישור:</p>
        <div class="m-pin" id="m-pin">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="text" maxlength="1" inputmode="numeric" autocomplete="off">
        </div>
        <div class="m-acts">
            <button class="m-confirm" onclick="confirmRun()">אשר</button>
            <button class="m-cancel" onclick="closeRunModal()">ביטול</button>
        </div>
        <div class="m-err" id="m-err"></div>
    </div>
</div>
<div id="add-ticker-modal" class="modal">
    <div class="modal-box">
        <h3>הוסף טיקר למעקב</h3>
        <div class="m-section">
            <div class="m-section-title">בחר שוק</div>
            <div class="m-market-selector">
                <button class="m-market-btn active" data-market="US" onclick="selectMarket('US',this)">🇺🇸 שוק אמריקאי</button>
                <button class="m-market-btn" data-market="IL" onclick="selectMarket('IL',this)">🇮🇱 שוק ישראלי</button>
            </div>
        </div>
        <div class="m-input-group ac-wrap">
            <label>הקלד טיקר או שם חברה</label>
            <input type="text" id="add-ticker-input" placeholder="AAPL, Tesla, תעשיות..." autocomplete="off" maxlength="40">
            <div class="ac-list" id="ac-list"></div>
        </div>
        <div class="m-input-group" id="name-group" style="display:none">
            <label>שם החברה</label>
            <input type="text" id="add-name-input" placeholder="" autocomplete="off" maxlength="50" readonly>
        </div>
        <div class="m-acts">
            <button class="m-confirm" onclick="confirmAddTicker()">הוסף וסרוק</button>
            <button class="m-cancel" onclick="closeAddTickerModal()">ביטול</button>
        </div>
        <div class="m-err" id="add-err"></div>
    </div>
</div>
<script>
let HASH="",S_HRS=24,MAX_ATT=5,LOCK_MIN=15,att=0,lockUntil=0;
const WATCHLIST=["ASML","PLTR","MELI","URNM","FCX","ISRG","PWR","XYL","STNG","SMH","LNG","SOXX","QQQ","SPY","MU"];
let DATA=null,currentFilter="all",selectedAnalysisType="short",selectedMarket="US";

(async()=>{try{const r=await fetch("config.json?v="+Date.now());const c=await r.json();HASH=c.auth.pin_hash;MAX_ATT=c.auth.max_attempts||5;LOCK_MIN=c.auth.lockout_minutes||15;S_HRS=c.auth.session_hours||24}catch(e){console.error("Config:",e)}})();

async function sha256(m){const d=new TextEncoder().encode(m);const h=await crypto.subtle.digest("SHA-256",d);return[...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,"0")).join("")}

(function(){const s=getSess();if(s&&s.exp>Date.now())showApp();else{document.getElementById("login").classList.remove("hide");initPins("pin-box")}})();

function getSess(){try{const r=sessionStorage.getItem("cats");return r?JSON.parse(r):null}catch{return null}}
function setSess(){sessionStorage.setItem("cats",JSON.stringify({ts:Date.now(),exp:Date.now()+(S_HRS*36e5)}))}

function initPins(id){
    const box=document.getElementById(id);
    const ins=[...box.querySelectorAll("input")];
    ins.forEach((inp,i)=>{
        inp.addEventListener("input",function(){
            this.value=this.value.replace(/\D/g,"");
            if(this.value&&i<ins.length-1)ins[i+1].focus();
            if(i===ins.length-1&&this.value){if(id==="pin-box")tryLogin();else confirmRun()}
        });
        inp.addEventListener("keydown",function(e){
            if(e.key==="Backspace"&&!this.value&&i>0){ins[i-1].focus();ins[i-1].value=""}
            if(e.key==="Enter"){if(id==="pin-box")tryLogin();else confirmRun()}
            if(e.key==="Escape"&&id==="m-pin")closeRunModal();
        });
        inp.addEventListener("paste",function(e){
            e.preventDefault();
            const p=(e.clipboardData||window.clipboardData).getData("text").replace(/\D/g,"");
            for(let j=0;j<Math.min(p.length,ins.length);j++)ins[j].value=p[j];
            if(p.length>=ins.length){ins[ins.length-1].focus();if(id==="pin-box")tryLogin();else confirmRun()}
        });
    });
    ins[0].focus();
}

async function tryLogin(){
    const now=Date.now();
    if(now<lockUntil){document.getElementById("login-msg").innerHTML='<span class="lock">נעילה. נסה בעוד '+Math.ceil((lockUntil-now)/6e4)+' דקות</span>';return}
    const ins=[...document.querySelectorAll("#pin-box input")];
    let pin="";ins.forEach(i=>pin+=i.value);
    if(pin.length!==6){document.getElementById("login-msg").textContent="הזן 6 ספרות";return}
    const h=await sha256(pin);
    if(h===HASH){setSess();showApp()}
    else{att++;if(att>=MAX_ATT){lockUntil=Date.now()+(LOCK_MIN*6e4);document.getElementById("login-msg").innerHTML='<span class="lock">נעילה ל-'+LOCK_MIN+' דקות</span>';att=0}else{document.getElementById("login-msg").textContent="קוד שגוי ("+(MAX_ATT-att)+" נותרו)"}
    ins.forEach(i=>{i.value="";i.classList.add("err")});setTimeout(()=>ins.forEach(i=>i.classList.remove("err")),500);ins[0].focus()}
}
function showApp(){document.getElementById("login").classList.add("hide");document.getElementById("app").classList.add("on");loadCustomTickers();loadData();buildTickerPicks()}
function logout(){sessionStorage.removeItem("cats");location.reload()}

function loadCustomTickers(){
    try{const ct=localStorage.getItem("custom_tickers");if(ct){const custom=JSON.parse(ct);WATCHLIST.push(...custom.map(c=>c.symbol))}}catch(e){console.error("Custom tickers:",e)}
}

function buildTickerPicks(){
    // Legacy — no longer needed for global SCAN modal
}

function getCustomTickers(){
    try{const ct=localStorage.getItem("custom_tickers");return ct?JSON.parse(ct):[]}catch{return[]}
}

async function loadData(){
    try{
        const r=await fetch("master_data.json?v="+Date.now());
        if(!r.ok)throw new Error(r.status);
        DATA=await r.json();
        render();
        loadHistIndex();
    }catch(e){
        document.getElementById("loading").innerHTML='<div style="color:var(--red)">שגיאה בטעינת נתונים</div><div style="margin-top:8px;font-size:11px;color:var(--txt3)">'+e.message+'</div>';
    }
}
async function loadHistIndex(){
    try{
        const r=await fetch("history/index.json?v="+Date.now());
        if(!r.ok)return;
        const idx=await r.json();
        if(idx.length>0){
            const sel=document.getElementById("hist-sel");
            idx.forEach(e=>{const o=document.createElement("option");o.value=e.file;o.textContent=e.date;sel.appendChild(o)});
            document.getElementById("infobar").classList.add("on");
        }
    }catch(e){}
}
async function loadHistory(f){
    if(!f){document.getElementById("arch-badge").classList.remove("on");try{const r=await fetch("master_data.json?v="+Date.now());DATA=await r.json();render()}catch(e){}return}
    try{const r=await fetch(f+"?v="+Date.now());if(!r.ok)throw 0;DATA=await r.json();document.getElementById("arch-badge").classList.add("on");render()}catch(e){alert("שגיאה בטעינת ארכיון")}
}

function setFilter(f,el){
    currentFilter=f;
    document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
    render();
}

function render(){
    document.getElementById("loading").style.display="none";
    const list=document.getElementById("stock-list");list.style.display="flex";list.innerHTML="";
    const m=DATA.meta||{};
    const s=m.market_status||"unknown";
    const sMap={open:"שוק פתוח",closed:"שוק סגור",pre_market:"טרום מסחר",after_hours:"אחרי שעות",weekend:"סופ\"ש"};
    document.getElementById("status").innerHTML='<span class="badge '+s+'">'+(sMap[s]||s)+'</span>';

    if(m.generated_at)document.getElementById("ts-info").textContent=new Date(m.generated_at).toLocaleString("he-IL");
    if(m.total_tickers)document.getElementById("scan-info").textContent=m.total_tickers+" מניות";
    document.getElementById("infobar").classList.add("on");

    const ft=document.getElementById("footer");ft.style.display="block";ft.textContent="CATALYST // "+(m.total_tickers||"?")+" stocks / v"+(m.pipeline_version||"3");

    let stocks=DATA.stocks||[];

    if(currentFilter==="bullish")stocks=stocks.filter(s=>s.direction==="bullish");
    else if(currentFilter==="bearish")stocks=stocks.filter(s=>s.direction==="bearish");
    else if(currentFilter==="high")stocks=stocks.filter(s=>(s.confidence||0)>=70);
    else if(currentFilter==="us")stocks=stocks.filter(s=>(s.market||"US")==="US");
    else if(currentFilter==="il")stocks=stocks.filter(s=>(s.market||"US")==="IL");

    if(!stocks.length){
        list.innerHTML='<div class="empty-state"><div style="font-size:28px;opacity:.3;margin-bottom:10px">—</div><div style="font-size:13px">אין תוצאות לפילטר הנוכחי</div></div>';
        return;
    }

    stocks.forEach((stock,idx)=>{
        const conf=stock.confidence||0;
        const cls=conf>=70?"hi":conf>=45?"mid":"lo";
        const dir=stock.direction||"neutral";
        const chg=stock.change_pct||0;
        const analysisType=stock.analysis_type||"";
        const card=document.createElement("div");
        card.className="card "+dir;
        card.onclick=()=>openDrawer(stock);

        let badgesHtml="";
        if(analysisType){
            const badgeIcon=analysisType==="short"?"⏱":"📅";
            const badgeCls=analysisType==="short"?"short":"long";
            badgesHtml=`<span class="card-badge ${badgeCls}">${badgeIcon}</span>`;
        }

        card.innerHTML=`
            <div class="card-row1">
                <div class="card-left">
                    <div class="card-ticker">${stock.ticker||"?"}</div>
                    <div>
                        <span class="card-price">$${(stock.price||0).toLocaleString()}</span>
                        <span class="card-change ${chg>=0?"up":"down"}">${chg>=0?"+":""}${chg.toFixed(2)}%</span>
                    </div>
                </div>
                <div class="card-right">
                    <div class="card-conf ${cls}">${conf}</div>
                </div>
            </div>
            <div class="card-row2">
                <span class="card-signal ${dir}">${stock.signal||""}</span>
                <span class="card-co">${stock.company_name||""}</span>
                ${badgesHtml?'<div class="card-badges">'+badgesHtml+'</div>':""}
            </div>
            <div class="card-bottom">${stock.bottom_line||""}</div>`;
        list.appendChild(card);
    });
}

function openDrawer(s){
    const dir=s.direction||"neutral";
    const conf=s.confidence||0;
    const cls=conf>=70?"hi":conf>=45?"mid":"lo";
    const chg=s.change_pct||0;
    const custom=getCustomTickers();
    const isCustom=custom.some(ct=>ct.symbol===s.ticker);

    let h=`<div class="d-head">
        <div class="d-ticker">${s.ticker}</div>
        <div class="d-meta">${s.company_name||""}${s.sector?" // "+s.sector:""}</div>
        <div class="d-price">$${(s.price||0).toLocaleString()} <span class="card-change ${chg>=0?"up":"down"}">${chg>=0?"+":""}${chg.toFixed(2)}%</span></div>
    </div>`;

    h+=`<div class="d-signal ${dir}">${s.signal||""}</div>`;
    h+=`<div class="d-conf">ביטחון: <strong class="${cls}">${conf}</strong> / 100</div>`;

    if(s.bottom_line)h+=`<div class="d-bl">${s.bottom_line}</div>`;

    // Per-ticker rescan buttons
    h+=`<div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="d-rescan" id="rescan-short-${s.ticker}" onclick="rescanTicker('${s.ticker}','short',this)">⏱ סריקה מחודשת — טווח קצר</button>
        <button class="d-rescan" id="rescan-long-${s.ticker}" onclick="rescanTicker('${s.ticker}','long',this)">📅 סריקה מחודשת — טווח ארוך</button>
    </div>`;

    if(s.buzz_alert){
        h+=`<div class="buzz-alert">
            <div class="buzz-alert-icon">⚠️</div>
            <div class="buzz-alert-content">
                <div class="buzz-alert-t">התראת באז</div>
                <div class="buzz-alert-b">${s.buzz_alert}</div>
            </div>
        </div>`;
    }

    if(s.earnings_insight)h+=`<div class="d-sec"><div class="d-sec-t">דוח רבעוני אחרון</div><div class="d-sec-b">${s.earnings_insight}</div></div>`;

    const cats=s.catalysts||[];
    if(cats.length){
        h+=`<div class="d-sec"><div class="d-sec-t">קטליזטורים</div>`;
        cats.forEach(c=>{
            const impCls=c.impact==="חיובי"?"pos":c.impact==="שלילי"?"neg":"unk";
            const typeCls=c.type||"business";
            h+=`<div class="cat-item ${impCls}">
                <div class="cat-head"><span class="cat-title">${c.title||""}</span><span class="cat-type ${typeCls}">${c.type||""}</span></div>
                <div class="cat-desc">${c.description||""}</div>
                <div class="cat-tf">${c.timeframe||""} // ${c.impact||""}</div>
            </div>`;
        });
        h+=`</div>`;
    }

    const qs=s.questions||[];
    if(qs.length){
        h+=`<div class="d-sec"><div class="d-sec-t">שאלות מפתח</div>`;
        qs.forEach(q=>{
            const impCls=q.implication==="חיובי"?"pos":q.implication==="שלילי"?"neg":"neut";
            h+=`<div class="qa" onclick="this.classList.toggle('open')">
                <div class="qa-q">${q.question||""}</div>
                <div class="qa-a">${q.answer||""}<br><span class="qa-imp ${impCls}">${q.implication||""}</span></div>
            </div>`;
        });
        h+=`</div>`;
    }

    // Sources
    const sources=s.sources||[];
    if(sources.length){
        h+=`<div class="d-sources"><div class="d-sources-t">תימוכין ומקורות</div><ul class="d-sources-list">`;
        sources.forEach(src=>{
            if(src.startsWith("http")){
                const display=src.length>60?src.substring(0,57)+"...":src;
                h+=`<li><a href="${src}" target="_blank" rel="noopener">${display}</a></li>`;
            }else{
                h+=`<li>${src}</li>`;
            }
        });
        h+=`</ul></div>`;
    }

    if(isCustom){
        h+=`<div class="d-sec" style="border-color:rgba(139,124,246,.3)">
            <button class="m-remove" onclick="removeCustomTicker('${s.ticker}')" style="width:100%;padding:10px;border-radius:8px;font-size:12px">הסר ממעקב</button>
        </div>`;
    }

    document.getElementById("drawer-c").innerHTML=h;
    document.getElementById("drawer").classList.add("on");
    document.getElementById("overlay").classList.add("on");
    document.body.style.overflow="hidden";
}

function removeCustomTicker(ticker){
    const custom=getCustomTickers().filter(ct=>ct.symbol!==ticker);
    localStorage.setItem("custom_tickers",JSON.stringify(custom));
    const idx=WATCHLIST.indexOf(ticker);
    if(idx>-1)WATCHLIST.splice(idx,1);
    closeDrawer();
    buildTickerPicks();
    render();
}

function closeDrawer(){
    document.getElementById("drawer").classList.remove("on");
    document.getElementById("overlay").classList.remove("on");
    document.body.style.overflow="";
}
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeDrawer();closeRunModal();closeAddTickerModal()}});

let selectedTicker="";

function selectAnalysisType(t,el){
    selectedAnalysisType=t;
    document.querySelectorAll(".m-analysis-opt").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
}

function showRunModal(){
    document.getElementById("run-modal").classList.add("on");
    document.getElementById("m-err").textContent="";
    selectedTicker="";
    selectedAnalysisType="short";
    document.querySelectorAll(".m-analysis-opt").forEach(b=>b.classList.toggle("active",b.dataset.type==="short"));
    [...document.querySelectorAll("#m-pin input")].forEach(i=>i.value="");
    initPins("m-pin");
}
function closeRunModal(){document.getElementById("run-modal").classList.remove("on")}

async function confirmRun(){
    const ins=[...document.querySelectorAll("#m-pin input")];
    let pin="";ins.forEach(i=>pin+=i.value);
    if(pin.length!==6){document.getElementById("m-err").textContent="הזן 6 ספרות";return}
    const h=await sha256(pin);
    if(h!==HASH){document.getElementById("m-err").textContent="קוד שגוי";ins.forEach(i=>i.value="");ins[0].focus();return}
    closeRunModal();triggerWorkflow(selectedTicker,selectedAnalysisType);
}

async function rescanTicker(ticker,analysisType,btn){
    if(!confirm(`לסרוק מחדש את ${ticker} (${analysisType==="short"?"טווח קצר":"טווח ארוך"})?`))return;
    btn.disabled=true;btn.classList.add("running");btn.textContent="סורק...";
    try{await triggerWorkflow(ticker,analysisType);btn.textContent="הסריקה רצה! ~2 דקות";setTimeout(()=>{location.reload()},120000)}catch(e){btn.textContent="שגיאה";btn.disabled=false;btn.classList.remove("running")}
}

async function triggerWorkflow(ticker,analysisType){
    const btn=document.getElementById("run-btn");
    btn.textContent="SCANNING...";btn.classList.add("running");btn.disabled=true;
    try{

// Autocomplete logic
(function(){
    const inp=document.getElementById("add-ticker-input");
    if(!inp)return;
    inp.addEventListener("input",function(){
        acSel=-1;
        filterAC(this.value.trim());
    });
    inp.addEventListener("keydown",function(e){
        const list=document.getElementById("ac-list");
        const items=list.querySelectorAll(".ac-item");
        if(e.key==="ArrowDown"){e.preventDefault();acSel=Math.min(acSel+1,items.length-1);highlightAC(items)}
        else if(e.key==="ArrowUp"){e.preventDefault();acSel=Math.max(acSel-1,0);highlightAC(items)}
        else if(e.key==="Enter"&&acSel>=0&&items[acSel]){e.preventDefault();items[acSel].click()}
        else if(e.key==="Escape"){list.classList.remove("on")}
    });
    document.addEventListener("click",function(e){
        if(!e.target.closest(".ac-wrap"))document.getElementById("ac-list").classList.remove("on");
    });
})();

function filterAC(q){
    const list=document.getElementById("ac-list");
    if(!q||q.length<1){list.classList.remove("on");return}
    const upper=q.toUpperCase();
    const lower=q.toLowerCase();
    // Search ALL markets — auto-select market on pick
    let matches=TICKER_DB.filter(t=>{
        return t.s.toUpperCase().includes(upper)||t.n.includes(q)||t.n.toLowerCase().includes(lower);
    });
    // Sort: exact symbol prefix first, then by symbol length
    matches.sort((a,b)=>{
        const aExact=a.s.toUpperCase().startsWith(upper)?0:1;
        const bExact=b.s.toUpperCase().startsWith(upper)?0:1;
        if(aExact!==bExact)return aExact-bExact;
        return a.s.length-b.s.length;
    });
    matches=matches.slice(0,10);
    if(!matches.length){list.classList.remove("on");return}
    list.innerHTML="";
    matches.forEach((t,i)=>{
        const d=document.createElement("div");
        d.className="ac-item";
        const flag=t.m==="IL"?"🇮🇱 ":"🇺🇸 ";
        d.innerHTML=`<span class="ac-sym">${t.s}</span><span class="ac-name">${flag}${t.n}</span>`;
        d.onclick=()=>selectAC(t);
        list.appendChild(d);
    });
    list.classList.add("on");
}

function highlightAC(items){
    items.forEach((it,i)=>it.classList.toggle("sel",i===acSel));
    if(items[acSel])items[acSel].scrollIntoView({block:"nearest"});
}

function selectAC(t){
    document.getElementById("add-ticker-input").value=t.s;
    document.getElementById("add-ticker-input").readOnly=true;
    document.getElementById("add-name-input").value=t.n;
    document.getElementById("name-group").style.display="block";
    document.getElementById("ac-list").classList.remove("on");
    // Auto-select market
    selectedMarket=t.m;
    document.querySelectorAll(".m-market-btn").forEach(b=>b.classList.toggle("active",b.dataset.market===t.m));
}

function confirmAddTicker(){
    const ticker=document.getElementById("add-ticker-input").value.trim().toUpperCase();
    const name=document.getElementById("add-name-input").value.trim();
    const errEl=document.getElementById("add-err");
    errEl.textContent="";

    if(!ticker||ticker.length===0){errEl.textContent="בחר טיקר מהרשימה";return}
    if(!name||name.length===0){errEl.textContent="בחר טיקר מהרשימה";return}

    const custom=getCustomTickers();
    if(custom.some(c=>c.symbol===ticker)||WATCHLIST.slice(0,15).includes(ticker)){
        errEl.textContent="טיקר זה כבר במעקב";
        return;
    }

    custom.push({symbol:ticker,name:name,market:selectedMarket});
    localStorage.setItem("custom_tickers",JSON.stringify(custom));

    if(!WATCHLIST.includes(ticker))WATCHLIST.push(ticker);

    closeAddTickerModal();

    // Show scanning state on a temporary card
    const placeholder={
        ticker:ticker,company_name:name,sector:"",signal:"סורק...",direction:"neutral",
        confidence:0,price:0,change_pct:0,bottom_line:"סריקה ראשונית בתהליך — טווח קצר + טווח ארוך...",
        analysis_type:"",market:selectedMarket,catalysts:[],questions:[],sources:[]
    };
    if(!DATA)DATA={stocks:[],meta:{}};
    DATA.stocks.push(placeholder);
    render();

    // Trigger both short AND long analysis
    triggerDualScan(ticker);
}

async function triggerDualScan(ticker){
    try{
        const _e="d1NlUDUwMmdVMWptVkk5OHV2bFpOSmJjMHZkRnRteDJ2bDREX3BoZw==";
        const _d=atob(_e).split("").reverse().join("");
        const headers={"Authorization":"token "+_d,"Accept":"application/vnd.github+json"};
        const url="https://api.github.com/repos/itzhak-iab/CATALYST/actions/workflows/daily_matrix.yml/dispatches";

        // Fire short analysis
        await fetch(url,{method:"POST",headers,body:JSON.stringify({ref:"main",inputs:{ticker:ticker,analysis_type:"short"}})});
        // Small delay to avoid race
        await new Promise(r=>setTimeout(r,2000));
        // Fire long analysis
        await fetch(url,{method:"POST",headers,body:JSON.stringify({ref:"main",inputs:{ticker:ticker,analysis_type:"long"}})});

        // Auto-reload after both should be done (~3 min)
        setTimeout(()=>location.reload(),180000);
    }catch(e){console.error("Dual scan error:",e)}
}
