name: Daily Catalyst Matrix

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Specific ticker(s) to analyze (comma-separated, empty = full scan)'
        required: false
        default: ''
      analysis_type:
        description: 'Analysis type: short (immediate triggers) or long (structural quality)'
        required: false
        default: 'short'
        type: choice
        options:
          - short
          - long

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run catalyst analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd backend
          ARGS=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="--ticker ${{ github.event.inputs.ticker }}"
          fi
          if [ -n "${{ github.event.inputs.analysis_type }}" ]; then
            ARGS="$ARGS --analysis-type ${{ github.event.inputs.analysis_type }}"
          fi
          python macro_agent.py $ARGS

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/master_data.json docs/history/
          TICKER="${{ github.event.inputs.ticker }}"
          ATYPE="${{ github.event.inputs.analysis_type }}"
          TS=$(date -u +"%Y-%m-%d %H:%M UTC")
          if [ -n "$TICKER" ]; then
            MSG="CATALYST – ${TICKER} [${ATYPE:-short}] ${TS}"
          else
            MSG="CATALYST update [${ATYPE:-short}] ${TS}"
          fi
          git diff --cached --quiet || git commit -m "$MSG"
          git push
